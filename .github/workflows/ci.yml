name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgis/postgis:16-3.4
        env:
          POSTGRES_USER: navix
          POSTGRES_PASSWORD: navix_dev_password
          POSTGRES_DB: navix
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U navix -d navix"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install
        run: npm ci

      - name: Build shared contracts
        run: npm run build -w packages/contracts

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Unit tests
        run: npm test

      - name: Run migrations (smoke)
        env:
          DB_HOST: localhost
          DB_DIRECT_PORT: 5432
          DB_USER: navix
          DB_PASSWORD: navix_dev_password
          DB_NAME: navix
        run: npm run migration:run

      - name: Build apps
        run: npm run build -w apps/api && npm run build -w apps/web
