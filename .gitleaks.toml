# Configuração do gitleaks para o secret scan do CI (ver .github/workflows/ci.yml).
# Estende as regras padrão do gitleaks e permite arquivos que contêm apenas
# placeholders de desenvolvimento / documentação — nunca segredos reais.
title = "Navix gitleaks config"

[extend]
useDefault = true

[allowlist]
description = "Arquivos de exemplo, infra local, documentação e testes (fixtures, sem segredos reais)"
paths = [
  '''\.env\.example$''',
  '''docker/docker-compose\.yml$''',
  '''^docs/''',
  '''package-lock\.json$''',
  # Testes usam valores fake (ex.: uma Idempotency-Key literal), que disparam o
  # rule generic-api-key. Fixtures de teste não são segredos reais.
  '''\.spec\.ts$''',
  '''\.e2e-spec\.ts$''',
  '''^apps/api/test/''',
]
