name: navix_mobile
description: Navix Mobile — app do motorista e da empresa (última milha).
publish_to: "none"
version: 0.1.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"
  flutter: ">=3.19.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # Estado
  flutter_bloc: ^8.1.6
  equatable: ^2.0.5

  # Navegação
  go_router: ^14.2.0

  # Injeção de dependências
  get_it: ^7.7.0

  # i18n (versão fixada pelo flutter_localizations do SDK)
  intl: ^0.20.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  bloc_test: ^9.1.7
  mocktail: ^1.0.4

flutter:
  uses-material-design: true
  generate: true
