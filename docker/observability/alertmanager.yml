# Alertmanager da Navix (auditoria 5, R8 — ADR-0057; webhook Slack — Fase 1).
#
# O webhook do Slack é um SEGREDO e NÃO mora aqui: é lido de um arquivo montado
# (`api_url_file`), fora do controle de versão. Crie o arquivo com a sua URL:
#   docker/observability/secrets/slack_webhook_url   (uma linha, gitignored)
# a partir do exemplo `slack_webhook_url.example`. Sem o arquivo, o Alertmanager
# sobe normalmente e mostra os alertas na UI (:9093); só o ENVIO ao Slack falha
# (logado) até o arquivo existir.

route:
  receiver: slack
  group_by: ['alertname', 'severity']
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h
  routes:
    # Críticos: agrupa mais rápido e repete com mais frequência.
    - matchers:
        - severity="critical"
      receiver: slack
      group_wait: 10s
      repeat_interval: 1h

receivers:
  - name: slack
    slack_configs:
      - api_url_file: /etc/alertmanager/secrets/slack_webhook_url
        channel: '#novo-canal' # canal dos alertas (o webhook já fixa o canal de destino)
        send_resolved: true # avisa quando o alerta RESOLVE, não só quando dispara
        title: '{{ .Status | toUpper }} · {{ .CommonLabels.alertname }}'
        text: >-
          {{ range .Alerts }}*{{ .Annotations.summary }}*
          {{ .Annotations.description }}
          {{ if .Annotations.runbook_url }}<{{ .Annotations.runbook_url }}|📖 runbook>{{ end }}
          {{ end }}

inhibit_rules:
  # Um NavixApiDown crítico silencia os alertas derivados (latência/erro) do
  # mesmo alvo — evita tempestade de alertas quando a causa é uma só.
  - source_matchers: [severity="critical", alertname="NavixApiDown"]
    target_matchers: [severity=~"warning|info"]
    equal: ['service']
