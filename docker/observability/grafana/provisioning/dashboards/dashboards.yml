apiVersion: 1

# Carrega os dashboards versionados em /var/lib/grafana/dashboards (ADR-0021).
providers:
  - name: navix
    orgId: 1
    folder: Navix
    type: file
    disableDeletion: false
    updateIntervalSeconds: 30
    allowUiUpdates: true
    options:
      path: /var/lib/grafana/dashboards
      foldersFromFilesStructure: false
